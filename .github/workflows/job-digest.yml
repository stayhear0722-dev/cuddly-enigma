name: Job Digest

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 */3 * *"

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Scan jobs and send email
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          RESUME_TEXT: ${{ secrets.RESUME_TEXT }}
        run: python -m src.scan

      - name: Commit generated history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/history.csv
          if git diff --cached --quiet; then
            echo "No history changes to commit."
          else
            git commit -m "chore: update job digest"
            git push
          fi
